server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 valid=10s ipv6=off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/v1/vehicles {
        set $vehicle_upstream vehicle-service:8000;
        proxy_pass http://$vehicle_upstream$request_uri;
    }

    location /api/v1/schedules {
        set $schedule_upstream schedule-service:8000;
        proxy_pass http://$schedule_upstream$request_uri;
    }

    location /api/v1/maintenance {
        set $maintenance_upstream maintenance-service:8000;
        proxy_pass http://$maintenance_upstream$request_uri;
    }

    location = /health {
        add_header Content-Type application/json;
        return 200 '{"status":"ok","service":"dispatching-api-gateway"}';
    }
}
